<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>ゼッケン読み取り</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  html, body { margin: 0; height: 100%; background: #000; overscroll-behavior: none; }
  #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #roi {
    position: fixed; border: 3px solid #ffd400; box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  #statusBar {
    position: fixed; left: 0; right: 0; bottom: 0; padding: 16px;
    background: rgba(0,0,0,0.55); color: #fff; font-family: -apple-system, sans-serif;
    text-align: center; backdrop-filter: blur(6px);
  }
  #lockedBib { font-size: 28px; font-weight: 700; margin: 0 0 4px; }
  #statusMessage { font-size: 13px; opacity: 0.8; margin: 0; }
  #settingsBtn {
    position: fixed; top: env(safe-area-inset-top, 12px); right: 12px;
    background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 8px;
    padding: 8px 12px; font-size: 14px;
  }
  #settingsPanel {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); color: #fff;
    font-family: -apple-system, sans-serif; padding: 24px; box-sizing: border-box;
    display: none; overflow-y: auto;
  }
  #settingsPanel.open { display: block; }
  #settingsPanel label { display: block; margin-top: 16px; font-size: 14px; }
  #settingsPanel input { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 4px; font-size: 16px; }
  #settingsPanel button { margin-top: 24px; width: 100%; padding: 12px; font-size: 16px; }
</style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="captureCanvas" style="display:none;"></canvas>
  <div id="roi"></div>

  <button id="settingsBtn">設定</button>

  <div id="statusBar">
    <p id="lockedBib">認識待機中…</p>
    <p id="statusMessage">カメラ初期化中…</p>
  </div>

  <div id="settingsPanel">
    <h2>設定</h2>
    <label>ESP32のURL（例: http://192.168.4.1/bib）
      <input id="cfgUrl" type="text">
    </label>
    <label>送信トークン（ESP32側 EXPECTED_TOKEN と一致させる）
      <input id="cfgToken" type="text">
    </label>
    <label>連続一致回数（confirmCount）
      <input id="cfgConfirmCount" type="number" min="1">
    </label>
    <label>最低信頼度（0〜100, minConfidence）
      <input id="cfgMinConfidence" type="number" min="0" max="100">
    </label>
    <label>ROI幅・高さ（画面比, 0.1〜1.0）
      <input id="cfgRoiW" type="number" step="0.05" min="0.1" max="1">
      <input id="cfgRoiH" type="number" step="0.05" min="0.1" max="1">
    </label>
    <button id="cfgSave">保存して閉じる</button>
  </div>

  <script src="vendor/tesseract/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
