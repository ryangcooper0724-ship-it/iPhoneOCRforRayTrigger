name: Deploy BibScanner web app to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "web/bib_scanner/**"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload web/bib_scanner as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/bib_scanner

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
